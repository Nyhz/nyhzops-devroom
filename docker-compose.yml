services:
  devroom:
    image: devroom:latest
    build:
      context: .
      target: dev
    container_name: devroom
    restart: unless-stopped
    environment:
      - DEVROOM_PORT=7777
      - DEVROOM_HOST=0.0.0.0
      - DEVROOM_DB_PATH=/data/devroom.db
      - DEVROOM_CLAUDE_PATH=claude
      - DEVROOM_DEV_BASE_PATH=/Users/nyhzdev/devroom/battlefields
      - DEVROOM_MAX_AGENTS=5
      # Uncomment for Telegram escalations:
      # - DEVROOM_TELEGRAM_ENABLED=true
      # - DEVROOM_TELEGRAM_BOT_TOKEN=your-token
      # - DEVROOM_TELEGRAM_CHAT_ID=your-chat-id
    volumes:
      # Source code — mounted from host for hot-reload
      - .:/app

      # Preserve container's node_modules (Linux native bindings, not macOS)
      - devroom-node-modules:/app/node_modules

      # Persistent database (host directory — survives volume wipes, backed by Time Machine)
      - /Users/nyhzdev/devroom/devroom-data:/data

      # Claude Code auth (shared read-only) & config (seeded at boot from /seed)
      - /Users/nyhzdev/.claude:/home/devroom/.claude
      - /Users/nyhzdev/.claude.json:/seed/.claude.json:ro

      # Battlefields — mounted at the SAME absolute path so DB paths stay valid
      - /Users/nyhzdev/devroom/battlefields:/Users/nyhzdev/devroom/battlefields
    ports:
      - "7777:7777"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - devroom

volumes:
  devroom-node-modules:
  caddy-data:
  caddy-config:
